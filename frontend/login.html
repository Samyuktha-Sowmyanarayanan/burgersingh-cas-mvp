<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Burger Singh — Conversation Analysis System</title>
  <link rel="icon" type="image/png" href="logo.png"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="login-page">
<div class="login-split">

  <div class="login-brand">
    <div class="login-brand-inner">
      <img src="logo.png" alt="Burger Singh" class="login-brand-logo"/>
      <h1>Burger Singh</h1>
      <p class="login-brand-tagline">Conversation Analysis System</p>
      <div class="login-feature-list">
        <div class="login-feature">
          <div class="login-feature-icon"><i data-lucide="mic"></i></div>
          <span class="login-feature-text">AI-Powered Audio Transcription</span>
        </div>
        <div class="login-feature">
          <div class="login-feature-icon"><i data-lucide="bar-chart-2"></i></div>
          <span class="login-feature-text">Real-Time Employee Scoring</span>
        </div>
        <div class="login-feature">
          <div class="login-feature-icon"><i data-lucide="map-pin"></i></div>
          <span class="login-feature-text">Regional Intelligence Analytics</span>
        </div>
        <div class="login-feature">
          <div class="login-feature-icon"><i data-lucide="award"></i></div>
          <span class="login-feature-text">Franchise Performance Rankings</span>
        </div>
      </div>
    </div>
  </div>

  <div class="login-form-side">
    <div class="login-form-container">
      <h2>Sign In</h2>
      <p class="login-subtitle">Access your dashboard</p>

      <div class="role-selector" id="role-selector">
        <button class="role-btn active" data-role="employee">Employee</button>
        <button class="role-btn" data-role="manager">Manager</button>
      </div>

      <div class="login-form-fields">
        <div class="form-group">
          <label for="login-id">Employee ID</label>
          <input class="form-control" type="text" id="login-id"
            placeholder="e.g. EMP-0241" autocomplete="username" required/>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input class="form-control" type="password" id="login-password"
            placeholder="Enter your password" autocomplete="current-password" required/>
        </div>
      </div>

      <div id="login-error" class="form-error hidden" style="margin-bottom:12px;"></div>

      <button class="btn btn-primary btn-full" id="login-btn">Sign In</button>

      <p class="login-footer">Burger Singh&nbsp;&middot;&nbsp; Powered by Gemini AI</p>
    </div>
  </div>

</div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });</script>
<script src="login.js"></script>
</body>
</html>
